<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
margin-top:30px;
}

#grid{
display:grid;
grid-template-columns:repeat(5,70px);
grid-template-rows:repeat(5,70px);
gap:4px;
margin-bottom:20px;
}

.cell{
width:70px;
height:70px;
border:1px solid #444;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

button{
padding:10px 18px;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<div id="grid"></div>
<button id="gen">Generate Map</button>

<script>
const grid=document.getElementById("grid")

for(let i=0;i<25;i++){
let d=document.createElement("div")
d.className="cell"
grid.appendChild(d)
}

function generate(){

let map=[]
for(let r=0;r<5;r++){
map[r]=[]
for(let c=0;c<5;c++) map[r][c]="coin"
}

let placed=0
while(placed<4){
let c=Math.floor(Math.random()*5)
if(map[0][c]=="coin"){
map[0][c]="ogre"
placed++
}
}

placed=0
while(placed<2){
let c=Math.floor(Math.random()*5)
if(map[0][c]=="coin"){
map[0][c]="treasure"
placed++
}
}

for(let r=0;r<5;r++){
for(let c=0;c<5;c++){

if(map[r][c]!="coin") continue

let diag=false
let ortho=false

let d1=[[1,1],[1,-1],[-1,1],[-1,-1]]
for(let d of d1){
let rr=r+d[0]
let cc=c+d[1]
if(rr>=0&&rr<5&&cc>=0&&cc<5){
if(map[rr][cc]=="ogre") diag=true
}
}

let d2=[[1,0],[-1,0],[0,1],[0,-1]]
for(let d of d2){
let rr=r+d[0]
let cc=c+d[1]
if(rr>=0&&rr<5&&cc>=0&&cc<5){
if(map[rr][cc]=="ogre") ortho=true
}
}

if(diag) map[r][c]="castle"
else if(ortho) map[r][c]="goblin"

}
}

for(let r=0;r<5;r++){
for(let c=0;c<5;c++){

let cell=grid.children[r*5+c]
let v=map[r][c]

if(v=="ogre") cell.textContent="👹"
else if(v=="treasure") cell.textContent="💰"
else if(v=="castle") cell.textContent="🏰"
else if(v=="goblin") cell.textContent="👺"
else cell.textContent="🪙"

}
}

}

document.getElementById("gen").onclick=generate
generate()
</script>

</body>
</html>
